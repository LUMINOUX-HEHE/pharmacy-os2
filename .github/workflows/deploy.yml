name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run lint
      - run: npm test
      - run: npm run build
      - run: docker build -f apps/api/Dockerfile -t pharmacy-os-api .
      - run: docker build -f apps/web/Dockerfile -t pharmacy-os-web .
